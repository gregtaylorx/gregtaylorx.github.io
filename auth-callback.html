<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VisaStay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    p  { font-size: 15px; color: #666; line-height: 1.5; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #5b4fcf;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      width: 100%;
    }
    .btn:hover { background: #4a3fbe; }
    .note { font-size: 13px; color: #999; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon">✈️</div>
    <h1>VisaStay</h1>
    <p>Loading…</p>
  </div>

  <script>
    const DEEP_LINK = 'com.digitalnomadessentials.digital_nomad_essentials://login-callback';

    function render(icon, title, body, linkHref, linkLabel, note) {
      document.getElementById('card').innerHTML =
        '<div class="icon">' + icon + '</div>' +
        '<h1>' + title + '</h1>' +
        '<p>' + body + '</p>' +
        (linkHref
          ? '<a href="' + linkHref + '" class="btn">' + linkLabel + '</a>'
          : '') +
        (note ? '<p class="note">' + note + '</p>' : '');
    }

    function init() {
      var query = new URLSearchParams(window.location.search);
      var hash  = new URLSearchParams(window.location.hash.replace(/^#/, ''));

      var code        = query.get('code');
      var accessToken = hash.get('access_token');
      var type        = query.get('type') || hash.get('type') || '';
      var errorDesc   = query.get('error_description') || hash.get('error_description');

      if (errorDesc) {
        render('⚠️', 'Link Expired',
          'This link has expired or is invalid. Request a new one from within the VisaStay app.',
          DEEP_LINK, 'Open VisaStay', null);
        return;
      }

      // PKCE flow — code must be exchanged inside the app (app holds the verifier).
      // Pass code + type to the app via deep link. User must tap — Android Chrome
      // blocks auto-redirect to custom URL schemes without a user gesture.
      if (code) {
        var deepLink = DEEP_LINK + '?code=' + encodeURIComponent(code)
                     + '&type=' + encodeURIComponent(type || 'signup');

        var isRecovery = type === 'recovery';
        render(
          isRecovery ? '🔑' : '✅',
          isRecovery ? 'Reset Your Password' : 'Email Confirmed!',
          isRecovery
            ? 'Tap below to open VisaStay and set your new password.'
            : 'Your email is confirmed. Tap below to open VisaStay.',
          deepLink,
          'Open VisaStay',
          'Make sure VisaStay is installed on this device.'
        );
        return;
      }

      // Implicit flow — forward hash fragment to the app.
      if (accessToken) {
        var deepLink2 = DEEP_LINK + '#' + window.location.hash.replace(/^#/, '');
        var isRec = type === 'recovery';
        render(
          isRec ? '🔑' : '✅',
          isRec ? 'Reset Your Password' : 'Email Confirmed!',
          isRec
            ? 'Tap below to open VisaStay and set your new password.'
            : 'Your email is confirmed. Tap below to open VisaStay.',
          deepLink2,
          'Open VisaStay',
          'Make sure VisaStay is installed on this device.'
        );
        return;
      }

      render('⚠️', 'Invalid Link',
        'This link has expired or is invalid. Request a new one from within the VisaStay app.',
        DEEP_LINK, 'Open VisaStay', null);
    }

    init();
  </script>
</body>
</html>
