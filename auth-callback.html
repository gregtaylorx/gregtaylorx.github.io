<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VisaStay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    p  { font-size: 15px; color: #666; line-height: 1.5; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #5b4fcf;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      width: 100%;
    }
    .btn:hover { background: #4a3fbe; }
    .note { font-size: 13px; color: #999; margin-top: 16px; }
    #loading { display: block; }
    #ready-view, #error-view { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">
      <div class="icon">✈️</div>
      <h1>VisaStay</h1>
      <p>Opening app…</p>
    </div>

    <div id="ready-view">
      <div class="icon" id="ready-icon">✅</div>
      <h1 id="ready-title">Email Confirmed!</h1>
      <p id="ready-msg">Tap below to open VisaStay.</p>
      <a id="open-btn" href="#" class="btn">Open VisaStay</a>
      <p class="note">If the app doesn't open, launch VisaStay manually.</p>
    </div>

    <div id="error-view">
      <div class="icon">⚠️</div>
      <h1>Invalid Link</h1>
      <p>This link has expired or is invalid. Please request a new one from within the VisaStay app.</p>
      <a href="com.digitalnomadessentials.digital_nomad_essentials://login-callback" class="btn">Open VisaStay</a>
    </div>
  </div>

  <script>
    const DEEP_LINK = 'com.digitalnomadessentials.digital_nomad_essentials://login-callback';

    function show(id) {
      ['loading', 'ready-view', 'error-view']
        .forEach(s => document.getElementById(s).style.display = s === id ? 'block' : 'none');
    }

    function init() {
      // Supabase PKCE sends ?code=XXX  (supabase-flutter 2.x default)
      // Supabase implicit sends #access_token=XXX&type=...
      const query  = new URLSearchParams(window.location.search);
      const hash   = new URLSearchParams(window.location.hash.replace(/^#/, ''));

      const code         = query.get('code');
      const accessToken  = hash.get('access_token');
      const type         = hash.get('type') || query.get('type');
      const errorDesc    = hash.get('error_description') || query.get('error_description');

      if (errorDesc) { show('error-view'); return; }

      if (code) {
        // PKCE flow: pass code AND type to the app.
        // The app reads type=recovery BEFORE exchanging the code so it can
        // activate PasswordRecoveryState synchronously, ahead of the router.
        const linkType = type || 'signup';
        const deepLink = DEEP_LINK + '?code=' + encodeURIComponent(code)
                       + '&type=' + encodeURIComponent(linkType);
        setupAndRedirect(deepLink, linkType);
        return;
      }

      if (accessToken) {
        // Implicit flow (older clients): forward everything to the app via hash.
        const deepLink = DEEP_LINK + '#' + window.location.hash.replace(/^#/, '');
        setupAndRedirect(deepLink, type);
        return;
      }

      // Nothing usable in the URL.
      show('error-view');
    }

    function setupAndRedirect(deepLink, type) {
      const isRecovery = type === 'recovery';
      document.getElementById('ready-icon').textContent = isRecovery ? '🔑' : '✅';
      document.getElementById('ready-title').textContent =
          isRecovery ? 'Reset Your Password' : 'Email Confirmed!';
      document.getElementById('ready-msg').textContent = isRecovery
          ? 'Tap below to open VisaStay and set your new password.'
          : 'Your email is confirmed. Tap below to sign in.';
      document.getElementById('open-btn').href = deepLink;
      show('ready-view');

      // Auto-open the app after a short delay.
      setTimeout(() => { window.location.href = deepLink; }, 600);
    }

    init();
  </script>
</body>
</html>
