<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisaStay — Confirming your email</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #666; font-size: 0.95rem; max-width: 320px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #ddd;
      border-top-color: #007AFF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fallback { display: none; margin-top: 20px; }
    .btn {
      display: inline-block;
      background: #007AFF;
      color: white;
      padding: 12px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h1>Opening VisaStay…</h1>
  <p>Redirecting you back to the app to complete sign up.</p>

  <div class="fallback" id="fallback">
    <p>If the app didn't open automatically, tap the button below.</p>
    <a id="deeplink" href="#" class="btn">Open VisaStay</a>
    <p style="margin-top:16px; font-size:0.85rem;">
      If you don't have the app installed, you can close this page and sign in manually.
    </p>
  </div>

  <script>
    (function () {
      var search = window.location.search;
      var hash   = window.location.hash;
      var deepLink = 'com.digitalnomadessentials.visastay://login-callback' + search + hash;
      document.getElementById('deeplink').href = deepLink;
      window.location.href = deepLink;
      setTimeout(function () {
        document.getElementById('fallback').style.display = 'block';
      }, 2000);
    })();
  </script>
</body>
</html>
